# ── Alembic Configuration ──────────────────────────────────────────────
# Argus OSINT Database Migrations
#
# A generic, single database configuration using SQLAlchemy async.
# The sqlalchemy.url value is read at migration time by env.py from
# argus.config.get_settings().DATABASE_URL so that environment-based
# configuration (DATABASE_URL env-var / .env file) takes precedence.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path prepend – ensures argus package is importable
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py
# file to be detected as revisions in the versions directory
sourceless = false

# version location specification; defaults to alembic/versions
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; default is os.pathsep
# version_path_separator = os

# set to 'true' to search source files recursively in each "version_locations" directory
# recursive_version_locations = false

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# The sqlalchemy.url value is NOT set here.  It is dynamically resolved
# at runtime in env.py from argus.config.get_settings().DATABASE_URL.
# sqlalchemy.url = driver://user:pass@host/dbname


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
